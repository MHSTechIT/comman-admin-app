# Render Blueprint - https://render.com/docs/blueprint-spec
# Deploy: Connect this repo at render.com → New → Blueprint
# IMPORTANT: After deploy, set all sync:false env vars in Render Dashboard → each service → Environment

services:
  # ── Frontend Dashboard (React / Vite static site) ──────────────────────────
  - type: static
    name: admin-dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false

    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_SERVICE_KEY
        sync: false
      - key: VITE_CHATBOT_API_URL
        sync: false            # Set to your chatbot-api Render URL, e.g. https://chatbot-api-xxxx.onrender.com
      - key: VITE_FI_APP_API_URL
        sync: false            # Set to your fi-app-api Render URL, e.g. https://fi-app-api-xxxx.onrender.com

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Chatbot Backend API (Python / FastAPI) ──────────────────────────────────
  - type: web
    name: chatbot-api
    runtime: python
    region: oregon
    rootDir: chatbot-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DB_CONNECTION
        sync: false            # postgresql+psycopg://postgres:$erver2026@13.234.115.104:5432/QNA_BOT
      - key: CORS_ORIGINS
        value: "*"

  # ── FI-App Backend API (Python / FastAPI) ───────────────────────────────────
  - type: web
    name: fi-app-api
    runtime: python
    region: oregon
    rootDir: fi-app-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DB_CONNECTION
        sync: false            # postgresql+psycopg://postgres:$erver2026@13.234.115.104:5432/AI_FI
      - key: CORS_ORIGINS
        value: "*"
